name: Update casks
on:
  push:
    paths:
      - 'casks.txt'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: nix
    steps:
      - uses: actions/checkout@v4

      - name: Update packages.json
        run: |
          json_array="[]"
          while IFS= read -r token || [ -n "$token" ]; do
            token=$(echo "$token" | sed 's/#.*//' | xargs)
            [ -z "$token" ] && continue
            echo "Fetching $token..."
            cask_json=$(curl -sfL "https://formulae.brew.sh/api/cask/$token.json")
            json_array=$(echo "$json_array" | jq --argjson new "$cask_json" '. += [$new]')
          done < casks.txt

          echo "$json_array" | jq '[.[] | {
            pname: .token,
            version: .version,
            src: { url: .url, sha256: .sha256 },
            installPhase: [
              .artifacts[] | to_entries[] |
              select(.key == "app") |
              .value[] |
              "mkdir -p \"$out/Applications/\(.)\" && cp -r \"\(.)\" \"$out/Applications\""
            ],
            meta: {
              description: .desc,
              homepage: .homepage
            }
          }]' > packages.json

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet packages.json; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "Forgejo Actions"
            git config user.email "git-actions@yanlincs.com"
            git add packages.json
            git commit -m "update packages.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send notification
        if: always()
        run: |
          if [ "${{ job.status }}" != "success" ]; then
            msg="Cask update failed"
          elif [ "${{ steps.commit.outputs.updated }}" = "true" ]; then
            msg="Cask update: packages updated"
          else
            msg="Cask update: no changes"
          fi
          curl -s -d "$msg" https://ntfy.sh/yanlincs-homelab
