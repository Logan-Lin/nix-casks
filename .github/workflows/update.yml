name: Update casks
on:
  push:
    paths:
      - 'casks.txt'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Update packages.json
        run: |
          json_array="[]"
          while IFS= read -r token || [ -n "$token" ]; do
            token=$(echo "$token" | sed 's/#.*//' | xargs)
            [ -z "$token" ] && continue
            echo "Fetching $token..."
            cask_json=$(curl -sfL "https://formulae.brew.sh/api/cask/$token.json")
            json_array=$(echo "$json_array" | jq --argjson new "$cask_json" '. += [$new]')
          done < casks.txt

          echo "$json_array" | jq '[.[] | {
            pname: .token,
            version: .version,
            src: { url: .url, sha256: .sha256 },
            installPhase: [
              .artifacts[] | to_entries[] |
              select(.key == "app") |
              .value[] |
              "mkdir -p \"$out/Applications/\(.)\" && cp -r \"\(.)\" \"$out/Applications\""
            ],
            meta: {
              description: .desc,
              homepage: .homepage
            }
          }]' > packages.json

      - name: Validate updated packages
        id: validate
        run: |
          old_json=$(git show HEAD:packages.json)
          new_json=$(cat packages.json)
          skipped=""
          validated="$new_json"

          for pname in $(echo "$new_json" | jq -r '.[].pname'); do
            old_entry=$(echo "$old_json" | jq --arg p "$pname" '.[] | select(.pname == $p)')
            new_entry=$(echo "$new_json" | jq --arg p "$pname" '.[] | select(.pname == $p)')

            if [ "$(echo "$old_entry" | jq '{url: .src.url, sha256: .src.sha256}')" = \
                 "$(echo "$new_entry" | jq '{url: .src.url, sha256: .src.sha256}')" ]; then
              continue
            fi

            url=$(echo "$new_entry" | jq -r '.src.url')
            expected_hash=$(echo "$new_entry" | jq -r '.src.sha256')
            echo "Validating $pname ($url)..."

            if ! curl -sfL --head --retry 2 "$url" > /dev/null 2>&1; then
              echo "FAIL: $pname URL not reachable"
              skipped="$skipped $pname(url)"
              if [ -n "$old_entry" ]; then
                validated=$(echo "$validated" | jq --arg p "$pname" --argjson old "$old_entry" \
                  '[.[] | if .pname == $p then $old else . end]')
              fi
              continue
            fi

            tmpfile=$(mktemp)
            if ! curl -sfL --retry 2 -o "$tmpfile" "$url"; then
              echo "FAIL: $pname download failed"
              skipped="$skipped $pname(download)"
              rm -f "$tmpfile"
              if [ -n "$old_entry" ]; then
                validated=$(echo "$validated" | jq --arg p "$pname" --argjson old "$old_entry" \
                  '[.[] | if .pname == $p then $old else . end]')
              fi
              continue
            fi

            actual_hash=$(sha256sum "$tmpfile" | cut -d' ' -f1)
            rm -f "$tmpfile"
            if [ "$actual_hash" != "$expected_hash" ]; then
              echo "FAIL: $pname hash mismatch (expected $expected_hash, got $actual_hash)"
              skipped="$skipped $pname(hash)"
              if [ -n "$old_entry" ]; then
                validated=$(echo "$validated" | jq --arg p "$pname" --argjson old "$old_entry" \
                  '[.[] | if .pname == $p then $old else . end]')
              fi
              continue
            fi

            echo "OK: $pname"
          done

          echo "$validated" | jq '.' > packages.json
          echo "skipped=${skipped:- none}" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet packages.json; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "git.bot@yanlincs.com"
            git add packages.json
            git commit -m "update packages.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send notification
        if: always()
        run: |
          if [ "${{ job.status }}" != "success" ]; then
            msg="Cask update failed"
          elif [ "${{ steps.commit.outputs.updated }}" = "true" ]; then
            msg="Cask update: packages updated (skipped:${{ steps.validate.outputs.skipped }})"
          else
            msg="Cask update: no changes"
          fi
          curl -s -d "$msg" https://ntfy.sh/yanlincs-homelab
