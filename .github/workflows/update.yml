name: Update casks
on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-casks
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate packages.json
        run: |
          json_array="[]"
          while IFS= read -r token || [ -n "$token" ]; do
            token=$(echo "$token" | sed 's/#.*//' | xargs)
            [ -z "$token" ] && continue
            echo "Fetching $token..."
            cask_json=$(curl -sfL "https://formulae.brew.sh/api/cask/$token.json")
            json_array=$(echo "$json_array" | jq --argjson new "$cask_json" '. += [$new]')
          done < casks.txt

          echo "$json_array" | jq '[.[] | {
            pname: .token,
            version: .version,
            src: { url: .url, sha256: .sha256 },
            installPhase: [
              .artifacts[] | to_entries[] |
              select(.key == "app") |
              .value[] |
              "mkdir -p \"$out/Applications/\(.)\" && cp -r \"\(.)\" \"$out/Applications\""
            ],
            meta: {
              description: .desc,
              homepage: .homepage
            }
          }]' > packages.json

      - name: Publish to archive branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "git.bot@yanlincs.com"

          master_sha="$(git rev-parse HEAD)"
          mv packages.json "$RUNNER_TEMP/packages.json"

          if git ls-remote --exit-code --heads origin archive >/dev/null 2>&1; then
            git fetch origin archive:refs/remotes/origin/archive
            git checkout -B archive origin/archive
            git read-tree -u --reset "$master_sha"
          else
            git checkout -B archive "$master_sha"
          fi

          cp "$RUNNER_TEMP/packages.json" packages.json
          git add -A

          if git diff --cached --quiet; then
            echo "packages.json unchanged; nothing to publish."
          else
            git commit -m "update packages.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin archive
          fi
